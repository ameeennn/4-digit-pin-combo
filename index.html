<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>4-Digit PIN Combinations Generator | Fixed First Digit Tool</title>
    <meta name="description" content="Generate and track all 1,000 possible 4-digit PIN combinations with a fixed first digit. Perfect for security testing, code recovery, and organizational use. Free tool by ameeennn.">
    <meta name="keywords" content="4 digit pin, pin code generator, pin combinations, security codes, passkey list, combination tracker">
    <meta name="author" content="ameeennn">
    <link rel="canonical" href="https://ameeennn.github.io/4-digit-pin-combo">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ameeennn.github.io/4-digit-pin-combo">
    <meta property="og:title" content="4-Digit PIN Combinations Generator">
    <meta property="og:description" content="Easily generate and export 4-digit PIN lists starting with any specific digit. Track your progress as you go.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .pin-card {
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .pin-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .pin-card.completed {
            background-color: #ecfdf5;
            border-color: #10b981;
            color: #047857;
            opacity: 0.7;
        }
        .pin-card.completed .fixed-digit {
            color: #10b981;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 110%;
            z-index: 100;
        }
        .dropdown-container:hover .dropdown-menu {
            display: block;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 mb-1">4-Digit PIN Explorer</h1>
                    <p class="text-slate-500">Fixed first digit tool. Click a PIN to mark it as "tried" or "completed".</p>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <!-- Export Dropdown -->
                    <div class="relative dropdown-container flex-1 md:flex-initial">
                        <button class="w-full bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Export As...
                        </button>
                        <div class="dropdown-menu bg-white border border-slate-200 shadow-xl rounded-xl p-1 min-w-[160px]">
                            <button onclick="exportData('csv')" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg transition-colors">CSV Spreadsheet</button>
                            <button onclick="exportData('json')" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg transition-colors">JSON Data</button>
                            <button onclick="exportData('txt')" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg transition-colors">Plain Text (.txt)</button>
                        </div>
                    </div>

                    <button id="copy-btn" class="flex-1 md:flex-initial bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        Copy All
                    </button>
                </div>
            </div>
            
            <div class="flex flex-col md:flex-row items-center gap-6 mt-6 pt-6 border-t border-slate-100">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Select Fixed First Digit:</label>
                    <div id="digit-selector" class="grid grid-cols-5 md:grid-cols-10 gap-2 w-full">
                        <!-- Buttons generated by JS -->
                    </div>
                </div>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center gap-4">
                    <div class="text-center">
                        <span class="block text-xs uppercase tracking-wider text-slate-400 font-bold">Progress</span>
                        <span id="counter" class="text-2xl font-mono font-bold text-indigo-600">0/1000</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Feedback Message -->
        <div id="toast" class="fixed top-4 right-4 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
            Action successful!
        </div>

        <!-- Grid Results -->
        <div id="results-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-8 gap-3 h-[60vh] overflow-y-auto custom-scrollbar pr-2">
            <!-- PIN cards generated by JS -->
        </div>
    </div>

    <script>
        let currentFixedDigit = 0;
        let completedPins = new Set();
        
        const selectorContainer = document.getElementById('digit-selector');
        const resultsGrid = document.getElementById('results-grid');
        const counterText = document.getElementById('counter');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        function init() {
            for (let i = 0; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = `digit-btn p-3 rounded-lg border-2 font-bold transition-all ${i === 0 ? 'bg-indigo-50 border-indigo-600 text-indigo-700' : 'bg-white border-slate-200 text-slate-600 hover:border-indigo-300'}`;
                btn.onclick = () => selectDigit(i, btn);
                selectorContainer.appendChild(btn);
            }
            generatePins();
        }

        function selectDigit(val, element) {
            currentFixedDigit = val;
            document.querySelectorAll('.digit-btn').forEach(b => {
                b.className = 'digit-btn p-3 rounded-lg border-2 font-bold transition-all bg-white border-slate-200 text-slate-600 hover:border-indigo-300';
            });
            element.className = 'digit-btn p-3 rounded-lg border-2 font-bold transition-all bg-indigo-50 border-indigo-600 text-indigo-700';
            generatePins();
        }

        function togglePinStatus(pin, cardElement) {
            if (completedPins.has(pin)) {
                completedPins.delete(pin);
                cardElement.classList.remove('completed');
            } else {
                completedPins.add(pin);
                cardElement.classList.add('completed');
            }
            updateCounter();
        }

        function updateCounter() {
            const currentSetCompleted = Array.from(completedPins).filter(p => p.startsWith(currentFixedDigit)).length;
            counterText.textContent = `${currentSetCompleted}/1000`;
        }

        function generatePins() {
            resultsGrid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i <= 999; i++) {
                const suffix = i.toString().padStart(3, '0');
                const fullPin = `${currentFixedDigit}${suffix}`;
                
                const card = document.createElement('div');
                card.className = 'pin-card bg-white p-3 rounded-xl border border-slate-200 text-center font-mono text-lg font-bold text-slate-700';
                if (completedPins.has(fullPin)) card.classList.add('completed');
                
                card.innerHTML = `<span class="fixed-digit text-indigo-600">${currentFixedDigit}</span>${suffix}`;
                card.onclick = () => togglePinStatus(fullPin, card);
                fragment.appendChild(card);
            }
            
            resultsGrid.appendChild(fragment);
            updateCounter();
        }

        copyBtn.onclick = () => {
            let allText = "4-Digit PIN List (Fixed Start: " + currentFixedDigit + ")\n";
            for (let i = 0; i <= 999; i++) {
                allText += `${currentFixedDigit}${i.toString().padStart(3, '0')}\n`;
            }
            
            const textArea = document.createElement("textarea");
            textArea.value = allText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("Copied 1,000 PINs!");
        };

        function exportData(format) {
            let content = "";
            let mimeType = "";
            let fileName = `pin_combinations_${currentFixedDigit}xxx`;

            const data = [];
            for (let i = 0; i <= 999; i++) {
                const pin = `${currentFixedDigit}${i.toString().padStart(3, '0')}`;
                data.push({ pin, status: completedPins.has(pin) ? "Completed" : "Pending" });
            }

            if (format === 'csv') {
                content = "PIN,Status\n" + data.map(d => `${d.pin},${d.status}`).join("\n");
                mimeType = "text/csv";
                fileName += ".csv";
            } else if (format === 'json') {
                content = JSON.stringify({
                    metadata: { fixedDigit: currentFixedDigit, total: 1000, exportedAt: new Date().toISOString() },
                    combinations: data
                }, null, 2);
                mimeType = "application/json";
                fileName += ".json";
            } else if (format === 'txt') {
                content = "PIN COMBINATION LIST\nFixed Starting Digit: " + currentFixedDigit + "\n" + "=".repeat(25) + "\n";
                content += data.map(d => `${d.pin} [${d.status}]`).join("\n");
                mimeType = "text/plain";
                fileName += ".txt";
            }

            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`Downloaded ${format.toUpperCase()}`);
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
